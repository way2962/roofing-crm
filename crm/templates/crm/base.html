<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ company_name }} — {% block title %}{{ page_title }}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
    <style>
        body { background: #f4f6f9; }
        .sidebar { background: #1a2332; min-height: 100vh; color: #fff; }
        .sidebar a { color: #a0aec0; text-decoration: none; padding: 0.6rem 1rem; display: block; border-radius: 0.375rem; }
        .sidebar a:hover, .sidebar a.active { background: #2d3a4e; color: #fff; }
        .sidebar .logo { padding: 1.2rem 1rem; font-size: 1.3rem; font-weight: 700; }
        .sidebar .logo span { color: #fbbf24; }
        .badge-new { background: #22c55e; }
        .badge-existing { background: #3b82f6; }
    </style>
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar" style="width: 240px; flex-shrink: 0;">
            <div class="logo">🏠 <span>{{ company_name }}</span></div>
            <nav class="px-2">
                <a href="{% url 'dashboard' %}" class="{% if page_title == 'Dashboard' %}active{% endif %}">📊 Dashboard</a>
                <a href="{% url 'appointment_list' %}" class="{% if page_title == 'Appointments' %}active{% endif %}">📅 Appointments</a>
                <a href="{% url 'client_list' %}" class="{% if page_title == 'Clients' %}active{% endif %}">👥 Clients</a>
                <a href="{% url 'call_log_create' %}" class="{% if page_title == 'Log a Call' %}active{% endif %}">📞 Log a Call</a>
                <a href="{% url 'call_simulator' %}" class="{% if page_title == 'Call Simulator' %}active{% endif %}">🤖 Call Simulator</a>
                <hr style="border-color: #2d3a4e;">
                <a href="/admin/" target="_blank">⚙️ Admin Panel</a>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-link text-decoration-none" style="color:#a0aec0; padding:0.6rem 1rem;">
                        🚪 Sign Out
                    </button>
                </form>
            </nav>
        </div>

        <!-- Main -->
        <div class="flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0">{% block heading %}{{ page_title }}{% endblock %}</h4>
                <div>
                    <span class="text-muted small">👤 {{ user.username }}</span>
                </div>
            </div>
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
