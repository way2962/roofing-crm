<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ company_name }} — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-1">🏠 {{ company_name }}</h3>
                        <p class="text-center text-muted mb-4">Sign in to continue</p>
                        {% if form.errors %}
                            <div class="alert alert-danger">Invalid username or password.</div>
                        {% endif %}
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                {{ form.username }}
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                {{ form.password }}
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Sign In</button>
                        </form>
                    </div>
                </div>
                <p class="text-center text-muted small mt-3">
                    {{ company_name }} — Roofing Company Management
                </p>
            </div>
        </div>
    </div>
    <script>
        document.querySelector('#id_username')?.classList.add('form-control');
        document.querySelector('#id_password')?.classList.add('form-control');
    </script>
</body>
</html>
